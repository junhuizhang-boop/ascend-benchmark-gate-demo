name: Two-stage Ascend benchmark gate demo

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - 'data/gate-latest.json'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  two-stage-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Run two-stage gate
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref || 'main' }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          GATE_ROOT: ${{ github.workspace }}/.gate-results
        run: |
          bash scripts/run_two_stage_gate.sh

      - name: Publish gate summary
        if: always()
        run: |
          if [[ -f .gate-results/summary.md ]]; then
            cat .gate-results/summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Export frontend data
        if: success()
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          git fetch origin "$HEAD_BRANCH:$HEAD_BRANCH" || true
          git switch "$HEAD_BRANCH" || true
          python3 scripts/export_gate_frontend.py \
            --gate-root .gate-results \
            --output data/gate-latest.json \
            --run-url "$RUN_URL" \
            --pr-number "$PR_NUMBER" \
            --branch "$HEAD_BRANCH"

      - name: Commit frontend update
        if: success() && github.event_name == 'pull_request'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: publish latest gate result"
          file_pattern: data/gate-latest.json
          branch: ${{ github.event.pull_request.head.ref }}

      - name: Upload gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: two-stage-gate-results
          path: .gate-results/
          include-hidden-files: true
          if-no-files-found: warn
